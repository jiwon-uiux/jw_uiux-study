<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion-Style Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol"; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-white text-gray-800 h-screen overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [pages, setPages] = useState([
                { id: 1, title: '🚀 2026년 3월 제품 출시', icon: '🚀' },
                { id: 2, title: '✍️ 마케팅 캠페인 기획', icon: '✍️' },
                { id: 3, title: '💻 프론트엔드 개발 일정', icon: '💻' }
            ]);
            const [activePage, setActivePage] = useState(pages[0]);
            
            const [tasks, setTasks] = useState([
                { id: 1, title: '경쟁사 UX/UI 분석 리포트 작성', status: 'In Progress', tag: 'Research' },
                { id: 2, title: '메인 대시보드 와이어프레임 설계', status: 'To Do', tag: 'Design' },
                { id: 3, title: '로그인 페이지 컴포넌트 개발', status: 'Done', tag: 'Development' }
            ]);
            const [newTask, setNewTask] = useState("");

            const addTask = (e) => {
                if(e.key === 'Enter' && newTask.trim() !== "") {
                    setTasks([...tasks, { id: Date.now(), title: newTask, status: 'To Do', tag: 'New' }]);
                    setNewTask("");
                }
            };

            const toggleStatus = (id, currentStatus) => {
                const nextStatus = currentStatus === 'To Do' ? 'In Progress' : currentStatus === 'In Progress' ? 'Done' : 'To Do';
                setTasks(tasks.map(task => task.id === id ? { ...task, status: nextStatus } : task));
            };

            return (
                <div class="flex h-screen">
                    {/* Sidebar */}
                    <div class="w-64 bg-gray-50 border-r border-gray-200 flex flex-col pt-4 hide-scrollbar">
                        <div class="px-4 mb-6 flex items-center gap-2 cursor-pointer hover:bg-gray-100 p-1 rounded">
                            <div class="w-6 h-6 bg-red-500 rounded text-white flex items-center justify-center font-bold text-xs">M</div>
                            <span class="font-semibold text-sm">My Workspace</span>
                        </div>
                        
                        <div class="px-4 mb-2">
                            <span class="text-xs font-semibold text-gray-500">PRIVATE</span>
                        </div>
                        
                        <ul class="flex-1 overflow-y-auto">
                            {pages.map(page => (
                                <li key={page.id} 
                                    onClick={() => setActivePage(page)}
                                    class={`px-4 py-1.5 text-sm cursor-pointer hover:bg-gray-200 flex items-center gap-2 ${activePage.id === page.id ? 'bg-gray-200 font-medium' : 'text-gray-600'}`}>
                                    <span>{page.icon}</span>
                                    {page.title}
                                </li>
                            ))}
                        </ul>
                        <div class="p-4 border-t border-gray-200">
                            <button class="flex items-center gap-2 text-gray-500 hover:text-gray-800 text-sm w-full">
                                <span class="text-lg">+</span> New Page
                            </button>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div class="flex-1 flex flex-col bg-white overflow-y-auto">
                        <div class="px-12 py-16 max-w-4xl w-full mx-auto">
                            {/* Page Header */}
                            <div class="mb-10 block">
                                <span class="text-6xl mb-4 block">{activePage.icon}</span>
                                <h1 class="text-4xl font-bold text-gray-900 outline-none" contentEditable suppressContentEditableWarning>
                                    {activePage.title}
                                </h1>
                                <p class="text-gray-400 mt-2 outline-none" contentEditable suppressContentEditableWarning>
                                    여기에 프로젝트에 대한 설명을 작성하거나 / 를 눌러 블록을 추가하세요.
                                </p>
                            </div>

                            {/* Divider */}
                            <hr class="border-gray-200 mb-8" />

                            {/* Task List Section */}
                            <div>
                                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                                    <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                                    Task Database
                                </h3>
                                
                                {/* Table Header */}
                                <div class="flex border-b border-gray-200 pb-2 text-sm text-gray-500 font-medium mb-2">
                                    <div class="w-8"></div>
                                    <div class="flex-1">Name</div>
                                    <div class="w-32">Status</div>
                                    <div class="w-32">Tags</div>
                                </div>

                                {/* Task Items */}
                                {tasks.map(task => (
                                    <div key={task.id} class="flex items-center py-2 border-b border-gray-100 hover:bg-gray-50 group">
                                        <div class="w-8 flex justify-center text-gray-300 opacity-0 group-hover:opacity-100 cursor-grab">⋮⋮</div>
                                        <div class="flex-1 font-medium text-gray-800">{task.title}</div>
                                        <div class="w-32">
                                            <span onClick={() => toggleStatus(task.id, task.status)} class={`cursor-pointer px-2 py-0.5 rounded text-xs font-medium 
                                                ${task.status === 'To Do' ? 'bg-gray-100 text-gray-600' : 
                                                  task.status === 'In Progress' ? 'bg-blue-100 text-blue-700' : 
                                                  'bg-green-100 text-green-700'}`}>
                                                {task.status}
                                            </span>
                                        </div>
                                        <div class="w-32">
                                            <span class="bg-purple-100 text-purple-700 px-2 py-0.5 rounded text-xs">{task.tag}</span>
                                        </div>
                                    </div>
                                ))}

                                {/* Add Task Input */}
                                <div class="flex items-center mt-2">
                                    <div class="w-8 text-center text-gray-400">+</div>
                                    <input 
                                        type="text" 
                                        class="flex-1 outline-none text-gray-600 placeholder-gray-400 text-sm py-1" 
                                        placeholder="새로운 과제를 입력하고 Enter를 누르세요..."
                                        value={newTask}
                                        onChange={(e) => setNewTask(e.target.value)}
                                        onKeyDown={addTask}
                                    />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>취준생 맞춤형 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgWhite: '#F9FAFB', // 부드러운 배경색
                        primary: '#7EA18A', // 안정감을 주는 세이지 그린
                        accent: '#FF8B74',  // 에너지를 주는 웜 코랄 (D-day용)
                        textMain: '#374151',
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Pretendard', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 토스트 팝업 애니메이션 */
        .toast-enter { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 액체가 차오르는 듯한 부드러운 트랜지션 */
        .progress-fluid { transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-bgWhite text-textMain h-screen overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 원형 진행률 차트 컴포넌트
        const DonutChart = ({ percentage }) => {
            const radius = 36;
            const circumference = 2 * Math.PI * radius;
            const strokeDashoffset = circumference - (percentage / 100) * circumference;
            return (
                <div className="relative flex items-center justify-center w-32 h-32 mx-auto my-6">
                    <svg className="transform -rotate-90 w-32 h-32">
                        <circle cx="64" cy="64" r={radius} stroke="#F3F4F6" strokeWidth="10" fill="transparent" />
                        <circle cx="64" cy="64" r={radius} stroke="#7EA18A" strokeWidth="10" fill="transparent" 
                                strokeDasharray={circumference} strokeDashoffset={strokeDashoffset} 
                                className="transition-all duration-1000 ease-in-out" strokeLinecap="round" />
                    </svg>
                    <div className="absolute flex flex-col items-center justify-center text-primary font-bold text-2xl">
                        {percentage}<span className="text-sm font-medium">%</span>
                    </div>
                </div>
            );
        };

        function App() {
            // 퍼널 보드의 단계들
            const stages = ['서류 전형', '인적성/코테', '1차 면접', '최종 합격'];
            
            // 초기 더미 데이터
            const [applications, setApplications] = useState([
                { id: 1, company: '네이버', role: '프론트엔드', stage: '서류 전형', dDay: 2, progress: 60, color: '#03C75A' },
                { id: 2, company: '카카오', role: '웹 개발', stage: '인적성/코테', dDay: 1, progress: 80, color: '#FEE500' },
                { id: 3, company: '당근마켓', role: 'UI/UX 디자이너', stage: '서류 전형', dDay: 5, progress: 20, color: '#FF7E36' },
                { id: 4, company: '토스', role: '프론트엔드', stage: '1차 면접', dDay: 7, progress: 100, color: '#0050FF' },
            ]);
            
            const [toast, setToast] = useState(null);

            // 다음 전형으로 이동시키는 인터랙션
            const moveNextStage = (id, currentStage, companyName) => {
                const currentIndex = stages.indexOf(currentStage);
                if (currentIndex < stages.length - 1) {
                    const nextStage = stages[currentIndex + 1];
                    setApplications(apps => apps.map(app => 
                        app.id === id ? { ...app, stage: nextStage, progress: 0 } : app
                    ));
                    
                    // 따뜻한 응원 토스트 메시지
                    setToast(`🎉 수고하셨어요! [${companyName}] 전형이 '${nextStage}'(으)로 넘어갔습니다.`);
                    setTimeout(() => setToast(null), 3500);
                }
            };

            // 잔디 심기용 더미 배열 (최근 28일)
            const grassBlocks = Array.from({ length: 28 }, () => Math.floor(Math.random() * 4));

            return (
                <div className="flex h-screen">
                    {/* 좌측 네비게이션 영역 */}
                    <div className="w-64 bg-white border-r border-gray-100 flex flex-col pt-8 shadow-sm z-10">
                        <div className="px-6 mb-8 flex items-center gap-3">
                            <div className="w-8 h-8 bg-primary rounded-lg text-white flex items-center justify-center font-bold text-sm shadow-md">
                                🌱
                            </div>
                            <span className="font-bold text-lg tracking-tight">GrowList</span>
                        </div>
                        
                        <div className="px-4 mb-2">
                            <span className="text-xs font-semibold text-gray-400 ml-2">MENU</span>
                        </div>
                        
                        <ul className="flex-1">
                            <li className="px-6 py-3 text-sm font-medium cursor-pointer text-primary bg-primary/10 border-r-4 border-primary">
                                📊 채용 퍼널 보드
                            </li>
                            <li className="px-6 py-3 text-sm font-medium cursor-pointer text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-colors">
                                📅 캘린더 뷰
                            </li>
                            <li className="px-6 py-3 text-sm font-medium cursor-pointer text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-colors">
                                🏢 기업별 모아보기
                            </li>
                            <li className="px-6 py-3 text-sm font-medium cursor-pointer text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-colors">
                                🏆 나의 보관함
                            </li>
                        </ul>
                    </div>

                    {/* 중앙 핵심 업무 영역 (칸반 보드) */}
                    <div className="flex-1 flex flex-col bg-bgWhite overflow-hidden">
                        <div className="px-10 pt-10 pb-6 flex justify-between items-end">
                            <div>
                                <h1 className="text-2xl font-bold text-gray-800">
                                    오늘도 한 걸음 나아가고 있는 <span className="text-primary">취준생</span>님, 응원해요!
                                </h1>
                                <p className="text-gray-500 mt-2 text-sm">현재 진행 중인 전형 현황을 한눈에 확인하세요.</p>
                            </div>
                            <button className="bg-primary hover:bg-[#6b8c76] text-white px-5 py-2.5 rounded-full text-sm font-bold shadow-md transition-all flex items-center gap-2">
                                <span>+</span> 새 일정 추가
                            </button>
                        </div>

                        {/* 보드 영역 (가로 스크롤) */}
                        <div className="flex-1 overflow-x-auto hide-scrollbar px-10 pb-10 flex gap-6">
                            {stages.map(stage => (
                                <div key={stage} className="flex-none w-80 flex flex-col">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-semibold text-gray-700">{stage}</h3>
                                        <span className="bg-gray-200 text-gray-600 text-xs py-0.5 px-2.5 rounded-full font-bold">
                                            {applications.filter(app => app.stage === stage).length}
                                        </span>
                                    </div>
                                    
                                    <div className="flex flex-col gap-4">
                                        {applications.filter(app => app.stage === stage).map(app => (
                                            <div key={app.id} className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow group relative overflow-hidden">
                                                {/* 상단: 로고 및 기업 정보 */}
                                                <div className="flex justify-between items-start mb-4">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold shadow-inner" style={{backgroundColor: app.color}}>
                                                            {app.company.charAt(0)}
                                                        </div>
                                                        <div>
                                                            <h4 className="font-bold text-gray-800 leading-tight">{app.company}</h4>
                                                            <p className="text-xs text-gray-500 mt-0.5">{app.role}</p>
                                                        </div>
                                                    </div>
                                                    {/* D-Day 배지 (3일 이하일 경우 코랄 포인트 컬러 적용) */}
                                                    <div className={`px-2.5 py-1 rounded-lg text-xs font-bold ${app.dDay <= 3 ? 'bg-accent/10 text-accent' : 'bg-gray-100 text-gray-600'}`}>
                                                        D-{app.dDay}
                                                    </div>
                                                </div>

                                                {/* 하단: 진행률 및 버튼 */}
                                                <div>
                                                    <div className="flex justify-between text-xs text-gray-500 mb-1.5">
                                                        <span>세부 과제 달성률</span>
                                                        <span className="font-semibold">{app.progress}%</span>
                                                    </div>
                                                    <div className="w-full bg-gray-100 rounded-full h-2 mb-4 overflow-hidden">
                                                        <div className="bg-primary h-2 rounded-full progress-fluid" style={{width: `${app.progress}%`}}></div>
                                                    </div>
                                                </div>

                                                {/* 다음 단계 버튼 */}
                                                {stage !== '최종 합격' && (
                                                    <button 
                                                        onClick={() => moveNextStage(app.id, stage, app.company)}
                                                        className="w-full py-2 bg-gray-50 hover:bg-primary/10 text-gray-600 hover:text-primary rounded-xl text-sm font-semibold transition-colors flex items-center justify-center gap-1">
                                                        다음 단계로 <span className="text-lg leading-none mb-0.5">›</span>
                                                    </button>
                                                )}
                                            </div>
                                        ))}
                                        
                                        {/* 카드가 없을 때 빈 상태 표시 */}
                                        {applications.filter(app => app.stage === stage).length === 0 && (
                                            <div className="border-2 border-dashed border-gray-200 rounded-2xl h-24 flex items-center justify-center text-sm text-gray-400">
                                                대기 중인 전형이 없습니다.
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* 우측 진행률 및 멘탈 케어 영역 */}
                    <div className="w-80 bg-white border-l border-gray-100 p-8 shadow-sm z-10 flex flex-col">
                        <h2 className="font-bold text-lg mb-6">나의 성장 기록</h2>
                        
                        {/* 도넛 차트 */}
                        <div className="bg-gray-50 rounded-2xl p-6 mb-6 text-center border border-gray-100">
                            <h3 className="text-sm font-semibold text-gray-600">이번 주 목표 달성률</h3>
                            <DonutChart percentage={75} />
                            <p className="text-xs text-gray-500">조금만 더 힘내면 목표 달성이에요!</p>
                        </div>

                        {/* 잔디 심기 (Contribution Graph) */}
                        <div className="bg-gray-50 rounded-2xl p-6 border border-gray-100">
                            <h3 className="text-sm font-semibold text-gray-600 mb-4">최근 나의 노력들</h3>
                            <div className="grid grid-cols-7 gap-1.5">
                                {grassBlocks.map((level, idx) => {
                                    const opacities = ['bg-gray-200', 'bg-primary/40', 'bg-primary/70', 'bg-primary'];
                                    return <div key={idx} className={`w-6 h-6 rounded-md ${opacities[level]} transition-all hover:scale-110 cursor-pointer`} title="과제 완료 기록"></div>
                                })}
                            </div>
                            <div className="mt-4 flex items-center justify-end gap-2 text-[10px] text-gray-400">
                                <span>Less</span>
                                <div className="w-3 h-3 rounded-sm bg-gray-200"></div>
                                <div className="w-3 h-3 rounded-sm bg-primary/40"></div>
                                <div className="w-3 h-3 rounded-sm bg-primary/70"></div>
                                <div className="w-3 h-3 rounded-sm bg-primary"></div>
                                <span>More</span>
                            </div>
                        </div>
                    </div>

                    {/* 토스트 팝업 */}
                    {toast && (
                        <div className="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 toast-enter z-50">
                            <div className="w-6 h-6 bg-accent rounded-full flex items-center justify-center text-sm">✨</div>
                            <span className="font-medium text-sm">{toast}</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
